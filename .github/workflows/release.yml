name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build both targets
        run: |
          npm run build
          npm run build:firefox

      - name: Lint Firefox package
        run: npx web-ext lint --source-dir dist-firefox --warnings-as-errors

      - name: Package zips
        run: |
          (cd dist && zip -r ../voice-ai-extension-chrome-${{ github.ref_name }}.zip ./*)
          (cd dist-firefox && zip -r ../voice-ai-extension-firefox-${{ github.ref_name }}.zip ./*)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            voice-ai-extension-chrome-${{ github.ref_name }}.zip
            voice-ai-extension-firefox-${{ github.ref_name }}.zip
