name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (Chrome)
        run: npm run build

      - name: Build (Firefox)
        run: npm run build:firefox

      - name: Lint Firefox package
        run: npx web-ext lint --source-dir dist-firefox --warnings-as-errors

      - name: Upload Chrome build
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Firefox build
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: dist-firefox/
          if-no-files-found: error
          retention-days: 14
